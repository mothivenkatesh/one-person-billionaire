# Promptfoo eval suite for gtm-ops — covers all 11 cf-* skills + 2 legacy.
# Run: `cd evals && npx promptfoo eval`.
# View: `npx promptfoo view`.
# CI gate: ≥85% baseline pass rate blocks merge.
description: "gtm-ops 11-skill regression eval suite (v1.0.0)"

providers:
  - id: openrouter:anthropic/claude-haiku-4-5
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
  - id: openrouter:anthropic/claude-opus-4-7
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY

# Each skill = one prompt + one cases file
prompts:
  # Spec-aligned skills (11)
  - file://cases/cf-icp-scout.prompt.md
  - file://cases/cf-outreach-writer.prompt.md
  - file://cases/cf-reply-classifier.prompt.md
  - file://cases/cf-stage-mover.prompt.md
  - file://cases/cf-cross-sell-detector.prompt.md
  - file://cases/cf-dormant-detector.prompt.md
  - file://cases/cf-churn-saver.prompt.md
  - file://cases/cf-weekly-report.prompt.md
  - file://cases/cf-drive-transcript-extractor.prompt.md
  - file://cases/cf-forms-router.prompt.md
  - file://cases/cf-din-watchdog.prompt.md
  # Legacy / pre-v1 prompts (kept for backward compat)
  - file://cases/meeting_prep.prompt.md
  - file://cases/icp_score.prompt.md

tests:
  # Spec-aligned skills (11)
  - file://cases/cf-icp-scout.yaml
  - file://cases/cf-outreach-writer.yaml
  - file://cases/cf-reply-classifier.yaml
  - file://cases/cf-stage-mover.yaml
  - file://cases/cf-cross-sell-detector.yaml
  - file://cases/cf-dormant-detector.yaml
  - file://cases/cf-churn-saver.yaml
  - file://cases/cf-weekly-report.yaml
  - file://cases/cf-drive-transcript-extractor.yaml
  - file://cases/cf-forms-router.yaml
  - file://cases/cf-din-watchdog.yaml
  # Legacy
  - file://cases/meeting_prep.yaml
  - file://cases/icp_score.yaml

defaultTest:
  assert:
    - type: latency
      threshold: 10000
    - type: cost
      threshold: 0.10

outputPath: ./results/eval-output.json
