- vars:
    payload: '{"raw_payload":{"form_name":"gtm.demo-request","respondent_email":"anita@nykaa.com","fields":{"company":"Nykaa","name":"Anita","email":"anita@nykaa.com","monthly_payments_volume_inr":"₹5Cr+","vertical":"D2C","urgency":"This quarter","consent_to_contact":true}}}'
  assert:
    - type: is-json
    - type: llm-rubric
      value: "intent_class is 'demo'. enrichment_priority is 'real_time'. downstream_agent_invocation.agent_name is 'cf-icp-scout' with high_intent_explicit=true. compliance_flags is empty (consent confirmed)."

- vars:
    payload: '{"raw_payload":{"form_name":"gtm.nps-survey","respondent_email":"r@boat.com","fields":{"account_id":"acc_boat_001","nps_score":4,"nps_comment":"Webhooks unreliable; considering Razorpay"}}}'
  assert:
    - type: is-json
    - type: llm-rubric
      value: "intent_class is 'nps'. downstream_agent_invocation.agent_name is 'cf-churn-saver' (detractor score). agent_payload_overrides.severity is 'P1' or 'P0'. transcript_evidence_passthrough includes the NPS comment as a churn_risk_phrase."

- vars:
    payload: '{"raw_payload":{"form_name":"gtm.nps-survey","respondent_email":"happy@user.com","fields":{"account_id":"acc_x","nps_score":10,"nps_comment":"Love the product"}}}'
  assert:
    - type: is-json
    - type: llm-rubric
      value: "intent_class is 'nps'. downstream_agent_invocation.agent_name is 'log_only' (promoter — no churn risk). May flag for advocacy."

- vars:
    payload: '{"raw_payload":{"form_name":"gtm.partner-signup","respondent_email":"agency@partner.com","fields":{"partner_company":"GrowthAgency","partner_type":"agency","target_merchant_segment":"D2C","consent_to_contact":true}}}'
  assert:
    - type: is-json
    - type: llm-rubric
      value: "intent_class is 'partner'. downstream_agent_invocation.agent_name is 'partner_ops_handoff'. enrichment_priority is 'real_time'."

- vars:
    payload: '{"raw_payload":{"form_name":"gtm.demo-request","respondent_email":"x@y.com","fields":{"consent_to_contact":false}}}'
  assert:
    - type: is-json
    - type: llm-rubric
      value: "compliance_flags is non-empty (consent missing). downstream_agent_invocation should be skip OR routing should NOT proceed without consent."
